# Google Sheets transport configuration
google_sheets:
  # Path to the service account JSON key file
  service_account_key_file: credentials/service_account.json
  # Google Sheets spreadsheet ID (from the sheet URL)
  spreadsheet_id: YOUR_SPREADSHEET_ID_HERE
  # Name of the tab to exclude from conversation listing (legacy, kept for compat)
  status_tab: status

# Claude Code CLI configuration
claude_code:
  # Path to the claude executable (use full path if not on PATH)
  executable: claude
  # Permission mode for unattended operation.
  # WARNING: bypassPermissions lets CC execute any tool without confirmation.
  # Only use on machines where you trust all sheet editors.
  permission_mode: bypassPermissions
  # Per-tab polling intervals (seconds) — each TabWorker polls fast when
  # active, slows down after idle_threshold_seconds of inactivity
  poll_fast_seconds: 2
  poll_slow_seconds: 30
  idle_threshold_seconds: 120
